<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>远程办公申请自动化审批</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fa; --card: #fff; --text: #1a1a2e;
  --primary: #4f46e5; --primary-light: #eef2ff;
  --success: #059669; --danger: #dc2626; --warning: #d97706;
  --border: #e2e8f0; --chat-user: #eef2ff; --chat-bot: #fff;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; }

/* Header */
.header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 1.15rem; font-weight: 600; }
.header .badge { font-size: .7rem; background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 10px; }
.header .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

/* Chat */
.chat { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
.chat::-webkit-scrollbar { width: 5px; }
.chat::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.msg { display: flex; gap: 10px; max-width: 85%; animation: slideIn .3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }
.msg.assistant { align-self: flex-start; }
.msg.system { align-self: center; max-width: 95%; }

.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.avatar.user { background: #4f46e5; color: #fff; }
.avatar.bot { background: #ede9fe; color: #7c3aed; }

.bubble { background: var(--chat-bot); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; line-height: 1.6; box-shadow: var(--shadow); }
.msg.user .bubble { background: var(--chat-user); border-color: var(--chat-user); }
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble pre { background: #f1f5f9; padding: 10px 14px; border-radius: 8px; font-size: .85rem; overflow-x: auto; white-space: pre-wrap; }

/* Confirm Card */
.confirm-card {
  background: #fff; border: 2px solid #d97706; border-radius: 16px; padding: 20px;
  box-shadow: 0 4px 12px rgba(217,119,6,.15); animation: confirmPulse 2s ease-in-out infinite;
}
@keyframes confirmPulse {
  0%, 100% { box-shadow: 0 4px 12px rgba(217,119,6,.15); }
  50% { box-shadow: 0 4px 24px rgba(217,119,6,.3); }
}
.confirm-card .confirm-title {
  font-size: 1rem; font-weight: 700; color: #d97706; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.confirm-card .confirm-title .icon { font-size: 1.3rem; }

.table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: .85rem; }
.table td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }
.table td:first-child { color: #64748b; width: 35%; white-space: nowrap; }

.confirm-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn { padding: 10px 24px; border: none; border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-approve { background: #059669; color: #fff; flex: 1; }
.btn-approve:hover { background: #047857; }
.btn-reject { background: #fff; color: #dc2626; border: 1.5px solid #dc2626; flex: 1; }
.btn-reject:hover { background: #fef2f2; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Tool indicator */
.tool-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .75rem; padding: 3px 10px; border-radius: 20px;
  background: #f3e8ff; color: #7c3aed; margin-bottom: 8px;
}

/* Input */
.input-bar { padding: 16px 24px; background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; }
.input-bar input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: .9rem; outline: none; transition: border .2s; }
.input-bar input:focus { border-color: #4f46e5; }
.input-bar button { padding: 12px 24px; background: #4f46e5; color: #fff; border: none; border-radius: 12px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .2s; }
.input-bar button:hover { background: #4338ca; }
.input-bar button:disabled { background: #a5b4fc; cursor: not-allowed; }

/* Status */
.status { display: flex; align-items: center; gap: 8px; padding: 4px 24px; font-size: .75rem; color: #64748b; }
.phase-badge { padding: 2px 8px; border-radius: 10px; font-weight: 600; font-size: .7rem; background: #e0e7ff; color: #3730a3; }
.phase-badge.confirm { background: #fef3c7; color: #92400e; animation: pulse 1.5s infinite; }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.5rem;">🏢</span>
  <div>
    <h1>远程办公申请审批</h1>
    <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
      <span class="dot"></span>
      <span class="badge">DeepSeek V4 Pro</span>
      <span class="badge">Pi Framework</span>
    </div>
  </div>
</div>

<div class="status" id="statusBar">
  <span class="phase-badge" id="phaseBadge">就绪</span>
  <span id="phaseText">请输入远程办公需求开始</span>
</div>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input id="input" type="text" placeholder="描述你的远程办公需求，例如：家人住院需要照顾3天..." autofocus>
  <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const phaseBadge = document.getElementById('phaseBadge');
const phaseText = document.getElementById('phaseText');

let isProcessing = false;
let currentBubble = null;
let history = [];

function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function setPhase(phase, text) {
  phaseBadge.textContent = phase;
  phaseBadge.className = 'phase-badge' + (phase.includes('确认') ? ' confirm' : '');
  phaseText.textContent = text;
}

function addMessage(role, html) {
  const avatarIcon = role === 'user' ? '👤' : '🤖';
  const msgClass = role === 'user' ? 'user' : 'assistant';
  const div = document.createElement('div');
  div.className = `msg ${msgClass}`;
  div.innerHTML = `<div class="avatar ${role === 'user' ? 'user' : 'bot'}">${avatarIcon}</div><div class="bubble">${html}</div>`;
  chat.appendChild(div);
  scrollBottom();
  return div.querySelector('.bubble');
}

function addConfirmCard(tool, form, fieldLabels) {
  const div = document.createElement('div');
  div.className = 'msg system';
  const title = tool === 'submit_form' ? '📋 确认提交表单' : '🚀 确认发起审批流程';
  const subtitle = tool === 'submit_form' ? '请核对以下信息后确认提交' : '请确认发起审批流程';

  let rows = '';
  for (const [key, label] of Object.entries(fieldLabels)) {
    if (form[key] !== undefined) {
      rows += `<tr><td>${label}</td><td><strong>${escapeHtml(String(form[key]))}</strong></td></tr>`;
    }
  }

  div.innerHTML = `
    <div class="confirm-card" id="confirm-${tool}">
      <div class="confirm-title"><span class="icon">🔒</span> ${title}</div>
      <p style="color:#64748b;font-size:.85rem;">${subtitle}</p>
      <table class="table">${rows}</table>
      <div class="confirm-actions">
        <button class="btn btn-reject" onclick="confirmAction(false, '${tool}')">❌ 拒绝</button>
        <button class="btn btn-approve" onclick="confirmAction(true, '${tool}')">✅ 确认${tool==='submit_form'?'提交':'发起'}</button>
      </div>
    </div>`;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function confirmAction(approved, tool) {
  document.getElementById('confirm-' + tool)?.remove();
  try {
    await fetch('/api/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved }),
    });
  } catch (e) {}
  addMessage('system', approved
    ? `<div style="color:#059669;font-weight:600;">✅ ${tool === 'submit_form' ? '已确认提交' : '已确认发起流程'}</div>`
    : `<div style="color:#dc2626;font-weight:600;">❌ ${tool === 'submit_form' ? '已拒绝提交' : '已拒绝发起流程'}</div>`);
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isProcessing) return;

  isProcessing = true;
  sendBtn.disabled = true;
  input.value = '';

  addMessage('user', `<p>${escapeHtml(text)}</p>`);
  history.push({ role: 'user', content: text });

  // Bot bubble
  currentBubble = addMessage('assistant', '<span id="streamText"></span>');
  const streamEl = document.getElementById('streamText');
  setPhase('思考中', 'Agent 正在分析…');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7).trim(); continue; }
        if (!line.startsWith('data: ')) continue;

        try {
          const data = JSON.parse(line.slice(6));
          switch (eventType) {
            case 'text':
              fullText += data.content;
              streamEl.textContent = fullText;
              scrollBottom();
              break;
            case 'confirm_required':
              addConfirmCard(data.tool, data.form, data.fieldLabels);
              setPhase(data.tool === 'submit_form' ? '第一次确认' : '第二次确认', '请确认后继续');
              break;
            case 'confirm_resolved':
              break;
            case 'tool_result':
              if (data.tool === 'get_current_date') setPhase('填表中', 'Agent 正在填写表单…');
              else if (data.tool === 'validate_form') setPhase('校验中', '校验表单…');
              break;
            case 'done':
              setPhase('完成', '流程结束');
              break;
            case 'error':
              streamEl.textContent = fullText + '\n\n⚠️ ' + data.message;
              setPhase('错误', data.message);
              break;
          }
        } catch (e) {}
      }
    }

    if (fullText) {
      history.push({ role: 'assistant', content: fullText });
    }
  } catch (err) {
    currentBubble.innerHTML += `<div style="color:#dc2626;">⚠️ 连接失败: ${err.message}</div>`;
    setPhase('错误', '连接失败');
  } finally {
    isProcessing = false;
    sendBtn.disabled = false;
    input.focus();
    scrollBottom();
  }
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
